<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscriber Screen</title>
  <style>
    body.overlay {
      background: transparent;
      margin: 0;
    }
    body.overlay .controls {
      display: none;
    }
  </style>
</head>
<body>
  <!--
    HOSTED SETUP (GitHub Pages)

    1. Create a GitHub repo and upload this file as index.html
    2. Repo → Settings → Pages → Source: main branch → Save
    3. Your page URL will be: https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/
    4. Twitch Developer Console → your app → OAuth Redirect URLs → add that exact URL
    5. Set CONFIG.clientId below, commit, and wait ~1 min for Pages to deploy
    6. Open the URL in a browser, log in once as the broadcaster
    7. OBS → Browser Source → URL: https://YOUR_USERNAME.github.io/YOUR_REPO_NAME/?overlay=1
       (Log in via OBS → Interact if needed; token is stored per-browser)
  -->
  <div id="app"></div>

  <script>
    // --- CONFIG: edit these values ---
    const CONFIG = {
      clientId: '1nvf1uvkdvjj51ax3sta5xszd30us0', // Twitch app Client ID
      accessToken: '', // Optional: paste a broadcaster token to skip login
      redirectUri: 'https://luciaeverblack.github.io/Subscriberscreen/', // Leave empty to auto-detect, or set to match Twitch exactly
      refreshIntervalMs: 60_000, // 0 to disable auto-refresh
    }
    // ---------------------------------

    const TWITCH_API = 'https://api.twitch.tv/helix'
    const TWITCH_AUTH = 'https://id.twitch.tv/oauth2/authorize'
    const SCOPE = 'channel:read:subscriptions'
    const TOKEN_KEY = 'twitch_access_token'
    const STATE_KEY = 'twitch_oauth_state'
    const isOverlay = new URLSearchParams(window.location.search).has('overlay')

    const app = document.getElementById('app')

    if (isOverlay) {
      document.body.classList.add('overlay')
    }

    function getRedirectUri() {
      if (CONFIG.redirectUri) {
        return CONFIG.redirectUri
      }
      const url = new URL(window.location.href)
      url.search = ''
      url.hash = ''
      let path = url.pathname
      if (path.endsWith('/index.html')) {
        path = path.slice(0, -'index.html'.length)
      }
      if (path !== '/' && !path.endsWith('/')) {
        path += '/'
      }
      return url.origin + path
    }

    function getPageUrl() {
      return window.location.pathname + (isOverlay ? '?overlay=1' : '')
    }

    function base64UrlEncode(buffer) {
      const binary = Array.from(buffer, (b) => String.fromCharCode(b)).join('')
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
    }

    function generateRandomState() {
      const bytes = new Uint8Array(32)
      crypto.getRandomValues(bytes)
      return base64UrlEncode(bytes)
    }

    function getToken() {
      return CONFIG.accessToken || localStorage.getItem(TOKEN_KEY)
    }

    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token)
    }

    function clearToken() {
      localStorage.removeItem(TOKEN_KEY)
      CONFIG.accessToken = ''
    }

    function render(html) {
      app.innerHTML = html
    }

    async function twitchGet(path, params = {}) {
      const url = new URL(TWITCH_API + path)
      for (const [key, value] of Object.entries(params)) {
        url.searchParams.set(key, value)
      }

      const response = await fetch(url, {
        headers: {
          authorization: 'Bearer ' + getToken(),
          'client-id': CONFIG.clientId,
        },
      })

      if (!response.ok) {
        throw new Error('Twitch API ' + response.status + ': ' + await response.text())
      }

      return response.json()
    }

    async function getBroadcaster() {
      const result = await twitchGet('/users')
      return result.data[0]
    }

    async function getAllSubscribers(broadcasterId) {
      const subscribers = []
      let cursor

      do {
        const params = { broadcaster_id: broadcasterId, first: '100' }
        if (cursor) params.after = cursor

        const page = await twitchGet('/subscriptions', params)
        subscribers.push(...page.data)
        cursor = page.pagination?.cursor
      } while (cursor)

      return subscribers
    }

    function startLogin() {
      if (!CONFIG.clientId) {
        throw new Error('Set CONFIG.clientId at the top of this file.')
      }

      const state = generateRandomState()
      sessionStorage.setItem(STATE_KEY, state)

      const params = new URLSearchParams({
        client_id: CONFIG.clientId,
        redirect_uri: getRedirectUri(),
        response_type: 'token',
        scope: SCOPE,
        state,
      })

      window.location.href = TWITCH_AUTH + '?' + params.toString()
    }

    function handleOAuthCallback() {
      const query = new URLSearchParams(window.location.search)
      const queryError = query.get('error')
      if (queryError) {
        throw new Error(query.get('error_description') || queryError)
      }

      if (!window.location.hash || window.location.hash.length <= 1) {
        return null
      }

      const params = new URLSearchParams(window.location.hash.slice(1))
      const error = params.get('error')
      if (error) {
        throw new Error(params.get('error_description') || error)
      }

      const token = params.get('access_token')
      if (!token) return null

      const savedState = sessionStorage.getItem(STATE_KEY)
      if (savedState && params.get('state') !== savedState) {
        throw new Error('OAuth state mismatch. Click Login again.')
      }
      sessionStorage.removeItem(STATE_KEY)

      setToken(token)
      window.history.replaceState({}, document.title, getPageUrl())
      return token
    }

    function renderLogin(message) {
      const redirectUri = getRedirectUri()
      render(
        '<p class="controls">' + (message || 'Log in with your broadcaster account.') + '</p>' +
        '<p class="controls"><small>OAuth redirect URI (must match Twitch app exactly):<br><code id="redirect-uri">' + redirectUri + '</code></small></p>' +
        '<button type="button" class="controls" id="login">Login with Twitch</button>'
      )
      document.getElementById('login').addEventListener('click', () => {
        try {
          startLogin()
        } catch (err) {
          renderLogin(err.message)
        }
      })
    }

    function renderSubscribers(channelName, subscribers) {
      const items = subscribers
        .map((sub) => '<li>' + (sub.user_name || sub.user_login) + '</li>')
        .join('')

      render(
        '<h1 class="controls">' + channelName + ' Subscribers</h1>' +
        '<button type="button" class="controls" id="logout">Log out</button>' +
        (subscribers.length
          ? '<ul>' + items + '</ul>'
          : '<p>No subscribers found.</p>')
      )

      document.getElementById('logout').addEventListener('click', () => {
        clearToken()
        renderLogin()
      })
    }

    async function loadSubscribers() {
      render('<p>Loading subscribers...</p>')

      let token = getToken()
      if (!token) {
        token = handleOAuthCallback()
      }

      if (!token) {
        renderLogin()
        return
      }

      if (!CONFIG.clientId) {
        throw new Error('Set CONFIG.clientId at the top of this file.')
      }

      const broadcaster = await getBroadcaster()
      const subscribers = await getAllSubscribers(broadcaster.id)
      renderSubscribers(broadcaster.display_name, subscribers)

      if (CONFIG.refreshIntervalMs > 0) {
        setTimeout(loadSubscribers, CONFIG.refreshIntervalMs)
      }
    }

    loadSubscribers().catch((err) => {
      render(
        '<p>' + err.message + '</p>' +
        '<button type="button" id="retry">Try again</button>'
      )
      document.getElementById('retry').addEventListener('click', () => {
        loadSubscribers().catch((e) => render('<p>' + e.message + '</p>'))
      })
    })
  </script>
</body>
</html>
