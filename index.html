<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subscriber Screen</title>
</head>
<body>
  <div id="app"></div>

  <script>
    // --- CONFIG: edit these values ---
    const CONFIG = {
      clientId: '', // Twitch app Client ID
      accessToken: '', // Optional: paste a broadcaster token here to skip login
      redirectUri: 'http://localhost:8080/subscriber-screen.html', // Must match Twitch app OAuth redirect exactly
      refreshIntervalMs: 60_000, // 0 to disable auto-refresh
    }
    // ---------------------------------

    const TWITCH_API = 'https://api.twitch.tv/helix'
    const TWITCH_AUTH = 'https://id.twitch.tv/oauth2/authorize'
    const TWITCH_TOKEN = 'https://id.twitch.tv/oauth2/token'
    const SCOPE = 'channel:read:subscriptions'
    const TOKEN_KEY = 'twitch_access_token'
    const VERIFIER_KEY = 'twitch_code_verifier'

    const app = document.getElementById('app')

    function base64UrlEncode(buffer) {
      const binary = Array.from(buffer, (b) => String.fromCharCode(b)).join('')
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
    }

    function generateCodeVerifier() {
      const bytes = new Uint8Array(32)
      crypto.getRandomValues(bytes)
      return base64UrlEncode(bytes)
    }

    async function generateCodeChallenge(verifier) {
      const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier))
      return base64UrlEncode(new Uint8Array(digest))
    }

    function getToken() {
      return CONFIG.accessToken || localStorage.getItem(TOKEN_KEY)
    }

    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token)
    }

    function clearToken() {
      localStorage.removeItem(TOKEN_KEY)
      CONFIG.accessToken = ''
    }

    function render(html) {
      app.innerHTML = html
    }

    async function twitchGet(path, params = {}) {
      const url = new URL(TWITCH_API + path)
      for (const [key, value] of Object.entries(params)) {
        url.searchParams.set(key, value)
      }

      const response = await fetch(url, {
        headers: {
          Authorization: 'Bearer ' + getToken(),
          'Client-Id': CONFIG.clientId,
        },
      })

      if (!response.ok) {
        throw new Error('Twitch API ' + response.status + ': ' + await response.text())
      }

      return response.json()
    }

    async function getBroadcaster() {
      const result = await twitchGet('/users')
      return result.data[0]
    }

    async function getAllSubscribers(broadcasterId) {
      const subscribers = []
      let cursor

      do {
        const params = { broadcaster_id: broadcasterId, first: '100' }
        if (cursor) params.after = cursor

        const page = await twitchGet('/subscriptions', params)
        subscribers.push(...page.data)
        cursor = page.pagination?.cursor
      } while (cursor)

      return subscribers
    }

    async function startLogin() {
      if (!CONFIG.clientId) {
        throw new Error('Set CONFIG.clientId at the top of this file.')
      }

      const verifier = generateCodeVerifier()
      localStorage.setItem(VERIFIER_KEY, verifier)

      const challenge = await generateCodeChallenge(verifier)
      const params = new URLSearchParams({
        client_id: CONFIG.clientId,
        redirect_uri: CONFIG.redirectUri,
        response_type: 'code',
        scope: SCOPE,
        code_challenge: challenge,
        code_challenge_method: 'S256',
      })

      window.location.href = TWITCH_AUTH + '?' + params.toString()
    }

    async function handleOAuthCallback() {
      const params = new URLSearchParams(window.location.search)
      const code = params.get('code')
      const error = params.get('error')

      if (error) {
        throw new Error(params.get('error_description') || error)
      }

      if (!code) return null

      const verifier = localStorage.getItem(VERIFIER_KEY)
      if (!verifier) {
        throw new Error('Missing OAuth verifier. Click Login again.')
      }

      const body = new URLSearchParams({
        client_id: CONFIG.clientId,
        code,
        grant_type: 'authorization_code',
        redirect_uri: CONFIG.redirectUri,
        code_verifier: verifier,
      })

      const response = await fetch(TWITCH_TOKEN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
      })

      if (!response.ok) {
        throw new Error('Token exchange failed: ' + await response.text())
      }

      const data = await response.json()
      setToken(data.access_token)
      localStorage.removeItem(VERIFIER_KEY)
      window.history.replaceState({}, document.title, CONFIG.redirectUri)
      return data.access_token
    }

    function renderLogin(message) {
      render(
        '<p>' + (message || 'Log in with your broadcaster account, or paste an access token in CONFIG.') + '</p>' +
        '<button type="button" id="login">Login with Twitch</button>'
      )
      document.getElementById('login').addEventListener('click', () => {
        startLogin().catch((err) => renderLogin(err.message))
      })
    }

    function renderSubscribers(channelName, subscribers) {
      const items = subscribers
        .map((sub) => '<li>' + (sub.user_name || sub.user_login) + '</li>')
        .join('')

      render(
        '<h1>' + channelName + ' Subscribers</h1>' +
        '<button type="button" id="logout">Log out</button>' +
        (subscribers.length
          ? '<ul>' + items + '</ul>'
          : '<p>No subscribers found.</p>')
      )

      document.getElementById('logout').addEventListener('click', () => {
        clearToken()
        renderLogin()
      })
    }

    async function loadSubscribers() {
      render('<p>Loading subscribers...</p>')

      let token = getToken()
      if (!token) {
        token = await handleOAuthCallback()
      }

      if (!token) {
        renderLogin()
        return
      }

      if (!CONFIG.clientId) {
        throw new Error('Set CONFIG.clientId at the top of this file.')
      }

      const broadcaster = await getBroadcaster()
      const subscribers = await getAllSubscribers(broadcaster.id)
      renderSubscribers(broadcaster.display_name, subscribers)

      if (CONFIG.refreshIntervalMs > 0) {
        setTimeout(loadSubscribers, CONFIG.refreshIntervalMs)
      }
    }

    loadSubscribers().catch((err) => {
      render(
        '<p>' + err.message + '</p>' +
        '<button type="button" id="retry">Try again</button>'
      )
      document.getElementById('retry').addEventListener('click', () => {
        loadSubscribers().catch((e) => render('<p>' + e.message + '</p>'))
      })
    })
  </script>
</body>
</html>
